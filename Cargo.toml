[package]
name = "dsi-bitstream"
version = "0.1.0"
edition = "2021"
authors = ["Tommaso Fontana", "Sebastiano Vigna <sebastiano.vigna@unimi.it>"]

[dependencies]
anyhow = { version = "1.0.71", default-features = false }
rand = "0.8.5"
rand_distr = "0.4.3"

[features]
default = ["std"]
std = ["alloc", "anyhow/std"]
alloc = []

[profile.release] # Used for the examples
opt-level = 3             # like --release
lto = "fat"               # Full LTO
overflow-checks = false   # Disable integer overflow checks.
debug = false             # Include debug info.
debug-assertions = false  # Enables debug assertions.
codegen-units=1           # slower compile times, but maybe better perf
